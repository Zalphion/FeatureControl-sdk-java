[versions]

kotlin = "2.3.21"
junit = "6.0.3"
forkhandles = "2.25.5.0"

[plugins]

kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }

[libraries]

# forkhandles
forkhandles-result4k = { module = "dev.forkhandles:result4k", version.ref = "forkhandles" }
forkhandles-result4k-kotest = { module = "dev.forkhandles:result4k-kotest", version.ref = "forkhandles" }
forkhandles-time4k = { module = "dev.forkhandles:time4k", version.ref = "forkhandles" }

# junit
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit" }
junit-jupiter-api = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher", version.ref = "junit" }

# other
slf4j-api = { module = "org.slf4j:slf4j-api", version = "2.0.18" }
kotlin-serialization = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version = "1.11.0" }
kotest-assertions-core-jvm = { module = "io.kotest:kotest-assertions-core-jvm", version = "6.1.11" }